{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-10"> <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-header bg-dark text-white text-center py-4">
                    <h3 class="font-weight-light my-2">📊 ERP Licitaciones</h3>
                    <p class="mb-0 small">Acceso Corporativo</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %} 
                        
                        {{ form.as_p }}
                        
                        <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3 bg-light">
                    <div class="small text-muted">Protegido por Django Security</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
